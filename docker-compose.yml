version: "3.9"

services:
  api:
    image: aslam6161/sample-api:latest 
    container_name: sample-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Dedicated service that only runs tests (useful in CI)
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    container_name: sample-api-tests
    volumes:
      - ./TestResults:/TestResults   # expose TRX + coverage reports
    profiles:
      - test                         # run with: docker compose --profile test up test
